name: Update LPR Data

on:
  schedule:
    # 每月 20 日 UTC 01:30 (北京时间 09:30)
    - cron: '30 1 20 * *'
  workflow_dispatch: # 支持手动点击按钮触发

jobs:
  fetch_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Fetch and Process Data
        run: |
          python .github/workflows/update_lpr.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lpr/lpr_history.json
          # 只有在文件发生变化时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update lpr data $(date +%F)" && git push)